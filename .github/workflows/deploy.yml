name: CI/CD Pipeline Backend

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test-deploy:
    name: Compilación, Pruebas y Despliegue
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar el código fuente
        uses: actions/checkout@v4

      - name: 2. Configurar entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # Ajusta esta ruta si tu package-lock no está en la raíz del repo
          cache-dependency-path: Backend/package-lock.json 

      - name: 3. Instalación de dependencias
        run: npm ci
        working-directory: ./Backend

      - name: 4. Ejecución de Pruebas y Cobertura (CI)
        run: npm run test:coverage
        working-directory: ./Backend
        env:
          NODE_ENV: test
          SESSION_SECRET: "test_secret"
          JWT_SECRET: "test_jwt_secret"
          CLIENT_URL: "http://localhost:5173"

      - name: 5. Despliegue en Render (CD)
        if: success() && github.event_name == 'push'
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Pipeline completado: Tests pasados y despliegue enviado a Render."
