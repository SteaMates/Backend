name: CI/CD Pipeline Backend

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test-deploy:
    name: Compilación, Pruebas y Despliegue
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar el código fuente
        uses: actions/checkout@v4

      - name: 2. Configurar entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # CORRECCIÓN: Se utiliza minúscula y se pone entre comillas para mayor seguridad
          cache-dependency-path: 'backend/package-lock.json'

      - name: 3. Instalación de dependencias
        # Nos aseguramos de entrar en la carpeta antes de instalar
        working-directory: ./backend
        run: npm ci

      - name: 4. Ejecución de Pruebas y Cobertura (CI)
        working-directory: ./backend
        run: npm run test:coverage
        env:
          NODE_ENV: test
          SESSION_SECRET: "test_secret"
          JWT_SECRET: "test_jwt_secret"
          CLIENT_URL: "http://localhost:5173"

      - name: 5. Despliegue en Render (CD)
        if: success() && github.event_name == 'push'
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Pipeline completado con éxito."
